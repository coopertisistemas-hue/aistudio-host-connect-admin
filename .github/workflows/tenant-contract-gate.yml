name: Tenant Contract Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tenant-contract-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Tenant Contract Gate
        shell: pwsh
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
          # Optional strict mode for Query B:
          # TENANT_CONTRACT_STRICT_POLICY_REF: "true"
        run: |
          if (-not $env:DATABASE_URL) {
            throw "CI_DATABASE_URL secret is required for tenant contract gate."
          }
          ./scripts/ci/run_tenant_contract_gate.ps1

